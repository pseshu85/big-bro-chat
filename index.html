<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Bro Mode</title>
    <style>
        /* COLOR PALETTE - MARIO THEME */
        :root {
            --mario-red: #E52D27;
            --mario-blue: #0437F2;
            --mario-yellow: #FFCC00;
            --yoshi-green: #43B047;
            --sky-blue: #E0F2FE;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--sky-blue); 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
        }

        /* HEADER */
        header {
            background-color: var(--mario-blue);
            padding: 15px; color: white;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        .brand { font-weight: 900; font-size: 1.2rem; }
        .pillar-box { display: flex; gap: 10px; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; }
        .pillar { font-size: 20px; filter: grayscale(100%); opacity: 0.3; transition: 0.3s; }
        .pillar.active { filter: grayscale(0%); opacity: 1; transform: scale(1.3); }

        /* CHAT AREA */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble {
            max-width: 80%; padding: 14px 18px; border-radius: 25px; font-size: 16px; line-height: 1.4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            animation: pop 0.3s ease-out;
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .user-bubble { align-self: flex-end; background-color: var(--mario-red); color: white; border-bottom-right-radius: 4px; }
        .ai-bubble { align-self: flex-start; background-color: white; color: #333; border-bottom-left-radius: 4px; border: 3px solid var(--mario-yellow); }

        /* INPUT AREA */
        #input-area { background: white; padding: 20px; display: flex; gap: 12px; border-top: 5px solid var(--mario-yellow); }
        textarea { flex: 1; border: 2px solid #ddd; border-radius: 15px; padding: 12px; font-size: 16px; outline: none; resize: none; }
        .btn { border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; transition: 0.2s; }
        .speak-btn { background: #94A3B8; }
        .speak-btn.active { background: var(--mario-red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .send-btn { background: var(--yoshi-green); box-shadow: 0 4px 0 #2D7A31; }
        
        .typing { font-style: italic; font-size: 14px; color: var(--mario-blue); margin: 10px 25px; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="brand">⭐ BIG BRO MODE</div>
        <div class="pillar-box">
            <span id="p-Reflection" class="pillar">🌟</span>
            <span id="p-EQ" class="pillar">🧠</span>
            <span id="p-Discipline" class="pillar">📚</span>
            <span id="p-Moral" class="pillar">🛡️</span>
        </div>
    </header>

    <div id="chat-container"></div>
    <div id="typing-indicator" class="typing">Big Bro is thinking... 💭</div>

    <div id="input-area">
        <button id="micBtn" class="btn speak-btn" onclick="startRecognition()">🎤</button>
        <textarea id="userInput" rows="1" placeholder="Tell me everything..."></textarea>
        <button class="btn send-btn" onclick="sendToAI()">🚀</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');

        // PASTE YOUR GOOGLE SCRIPT EXEC URL HERE!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynicFfzxVsmFJKUAA6GSqji0ex49ZA62N8nfAfEuSCRcXYBEXjpjtLVixmsBR1i8Y/exec';

        function appendMessage(text, isUser) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
            bubble.innerText = text;
            chatContainer.appendChild(bubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendToAI() {
            const text = userInput.value.trim();
            if (!text) return;
            appendMessage(text, true);
            userInput.value = "";
            callAI(text);
        }

        function callAI(text) {
            typingIndicator.style.display = "block";
        
            // 1. Encode the message so spaces/emojis don't break the link
            const finalUrl = SCRIPT_URL + "?message=" + encodeURIComponent(text);
        
            console.log("Sending to:", finalUrl); // For your F12 Console debugging
        
            fetch(finalUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(aiReply => {
                    typingIndicator.style.display = "none";
                    
                    // If the reply is still empty, show a placeholder
                    if (!aiReply || aiReply.trim() === "") {
                        appendMessage("Big Bro is thinking hard, but forgot to speak! Try again? 👊", false);
                    } else {
                        appendMessage(aiReply, false);
                        updatePillars();
                    }
                })
                .catch(err => {
                    typingIndicator.style.display = "none";
                    console.error("Fetch Error:", err);
                    appendMessage("Connection dropped! Check if the Script is set to 'Anyone'.", false);
                });
        }

        function startRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) return alert("Please use Chrome!");

            const rec = new window.SpeechRecognition();
            rec.onstart = () => micBtn.classList.add('active');
            rec.onend = () => micBtn.classList.remove('active');
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; };
            rec.start();
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); }
        });

        function updatePillars() {
            // Simplified manual pillar lighting for now
            const colors = ['Reflection', 'EQ', 'Discipline', 'Moral'];
            const rand = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('p-' + rand).classList.add('active');
        }

        window.onload = () => appendMessage("Hey Champion! 🚀 Big Bro is here. Ready to level up?", false);
    </script>
</body>
</html>
