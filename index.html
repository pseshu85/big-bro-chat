<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root { --mario-red: #E52D27; --mario-blue: #0437F2; --mario-yellow: #FFCC00; --yoshi-green: #43B047; }
      body { font-family: 'Segoe UI', sans-serif; background-color: #E0F2FE; margin: 0; display: flex; flex-direction: column; height: 100vh; }
      
      header { background: var(--mario-blue); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
      .brand { font-weight: 900; font-size: 1.2em; }
      .pillar-box { display: flex; gap: 8px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; }
      .pillar { font-size: 18px; filter: grayscale(100%); opacity: 0.3; transition: 0.3s; }
      .pillar.active { filter: grayscale(0%); opacity: 1; transform: scale(1.2); }

      #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
      .bubble { max-width: 80%; padding: 14px 18px; border-radius: 25px; font-size: 16px; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.05); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
      .user-bubble { align-self: flex-end; background: var(--mario-red); color: white; border-bottom-right-radius: 4px; }
      .ai-bubble { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; border: 2px solid var(--mario-yellow); }
      
      @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      #input-area { background: white; padding: 20px; display: flex; gap: 12px; border-top: 4px solid var(--mario-yellow); }
      textarea { flex: 1; border: 2px solid #ddd; border-radius: 15px; padding: 12px; outline: none; font-size: 16px; background: #F8FAFC; }
      .btn { border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
      .speak-btn { background: #94A3B8; }
      .speak-btn.active { background: var(--mario-red); }
      .send-btn { background: var(--yoshi-green); box-shadow: 0 4px 0 #2D7A31; }
      .typing { font-style: italic; font-size: 14px; color: var(--mario-blue); margin: 20px; display: none; }
    </style>
  </head>
  <body>

    <header>
      <div class="brand">⭐ BIG BRO MODE</div>
      <div class="pillar-box">
        <span id="p-Reflection" class="pillar">🌟</span>
        <span id="p-EQ" class="pillar">🧠</span>
        <span id="p-Discipline" class="pillar">📚</span>
        <span id="p-Moral" class="pillar">🛡️</span>
      </div>
    </header>

    <div id="chat-container"></div>
    <div id="typing-indicator" class="typing">Big Bro is thinking... 💭</div>

    <div id="input-area">
      <button id="micBtn" class="btn speak-btn" onclick="startRecognition()">🎤</button>
      <textarea id="userInput" rows="1" placeholder="Tell me everything..."></textarea>
      <button class="btn send-btn" onclick="sendToAI()">🚀</button>
    </div>

    <script>
      const chatContainer = document.getElementById('chat-container');
      const typingIndicator = document.getElementById('typing-indicator');
      const userInput = document.getElementById('userInput');
      const micBtn = document.getElementById('micBtn');

      // Update this URL with your latest "Anyone" access deployment
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzArJWJbo2UoLWuLg7C_UXKy3fU4HhbGsds8DVhbNB0cNb7MXWK9HSQsaAG3rU0x9o/exec';

      function appendMessage(text, isUser) {
        const bubble = document.createElement('div');
        bubble.className = `bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
        bubble.innerText = text;
        chatContainer.appendChild(bubble);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function sendToAI() {
        const text = userInput.value.trim();
        if (!text) return;
        appendMessage(text, true);
        userInput.value = "";
        callAI(text);
      }

      function callAI(text) {
        typingIndicator.style.display = "block";
        
        // This is the "Bridge" to your Google Brain
        fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', 
          body: JSON.stringify({ message: text })
        }).then(() => {
          typingIndicator.style.display = "none";
          appendMessage("Got it! 👊 Big Bro is logging that to your sheet now.", false);
        });
      }

      // THE WORKING MIC CODE
      function startRecognition() {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!window.SpeechRecognition) return alert("Try Chrome!");

        const rec = new window.SpeechRecognition();
        rec.onstart = () => micBtn.classList.add('active');
        rec.onend = () => micBtn.classList.remove('active');
        rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; };
        rec.start();
      }

      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); }
      });

      window.onload = () => appendMessage("Hey Champion! 🚀 Big Bro is here. Ready to talk?", false);
    </script>
  </body>
</html>
